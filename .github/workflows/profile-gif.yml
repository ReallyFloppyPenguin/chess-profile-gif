name: profile-gif

on:
  schedule:
    - cron: "*/5 * * * *"   # GitHub Actions minimum is 5 minutes
  workflow_dispatch:
  push:
    paths:
      - "chessgif/**"
      - ".github/workflows/profile-gif.yml"

permissions:
  contents: write

concurrency:
  group: profile-gif
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: chessgif/requirements.txt

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gifsicle fonts-noto-color-emoji

      - name: Install python deps
        run: |
          pip install -r chessgif/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Generate GIF
        env:
          CHESS_USERNAME: xXCreativeIonCannonXx
        run: python chessgif/generate.py

      - name: Commit updated gif
        run: |
          git config user.name  "profile-gif-bot"
          git config user.email "profile-gif-bot@users.noreply.github.com"
          if git diff --quiet profile.gif; then
            echo "no gif changes"
            exit 0
          fi
          git add profile.gif
          git commit -m "chore(profile): refresh gif [skip ci]"
          git push
